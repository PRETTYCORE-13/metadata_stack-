name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  ELIXIR_VERSION: "1.18.4"
  OTP_VERSION: "28.0.4"

jobs:
  # Reproduce el mismo ciclo que se corre a mano en el devcontainer:
  # migrar desde una base vacia, importar la metadata versionada, generar
  # todos los catalogos y compilar. Si el historial de migraciones tiene un
  # migration roto (como el caso de pty_motos) o la metadata quedo
  # desincronizada del codigo generado, este job falla ANTES de llegar a
  # build-image.
  validate:
    runs-on: ubuntu-latest
    env:
      MIX_ENV: test

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: metadata_app_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ env.ELIXIR_VERSION }}
          otp-version: ${{ env.OTP_VERSION }}

      - name: Cache deps
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-${{ hashFiles('mix.lock') }}
          restore-keys: ${{ runner.os }}-mix-

      - name: Instalar dependencias
        run: mix deps.get

      - name: Crear base de test
        run: mix ecto.create

      - name: Migrar desde base vacia
        run: mix ecto.migrate

      - name: Importar metadata versionada (Business Contexts)
        run: mix meta.import

      - name: Generar todos los catalogos desde metadata
        run: mix gen.catalogos

      - name: Verificar que no haya quedado nada sin commitear
        run: |
          git status --porcelain lib/metadata_app/meta_business_process/catalogos priv/repo/migrations priv/repo/catalogos > /tmp/drift.txt
          if [ -s /tmp/drift.txt ]; then
            echo "La metadata versionada generó archivos que no están commiteados:"
            cat /tmp/drift.txt
            echo "Corré 'mix gen.catalogos' localmente y commiteá el resultado."
            exit 1
          fi

      - name: Verificar que no queden reglas de negocio en estado stub
        run: |
          if grep -rl "# ESCRIBA SUS REGLAS AQUI" lib/metadata_app/meta_business_process/reglas/ > /tmp/stubs.txt 2>/dev/null; then
            echo "Hay reglas de negocio sin completar (todavia con el stub de 'mix motor.reglas.andamiar'):"
            cat /tmp/stubs.txt
            echo "Completa la logica de negocio antes de publicar, o desenganchala si no hace falta."
            exit 1
          fi

      - name: Compilar sin warnings
        run: mix compile --warning-as-errors

      - name: Test
        run: mix test

  # Solo corre si "validate" pasó. Arma la imagen de producción con el mismo
  # Dockerfile que se probó a mano (build stage con compilador, runtime sin
  # el) y la publica en GitHub Container Registry.
  build-image:
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Nombre de imagen para ghcr.io (minúsculas, sin separador final)
        run: |
          repo="${GITHUB_REPOSITORY,,}"
          repo="${repo%[-._]}"
          echo "IMAGE_NAME=$repo" >> "$GITHUB_ENV"

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.IMAGE_NAME }}:latest
            ghcr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}

  # Solo corre si "build-image" publicó la imagen nueva. Actualiza el
  # servicio en Docker Swarm (servidor de oficina, "producción simulada")
  # y corre las migraciones — el mismo ciclo manual documentado en
  # docs/ci-cd-deploy.md, ahora automático. Requiere 3 secrets en el repo
  # (Settings -> Secrets and variables -> Actions): DEPLOY_HOST,
  # DEPLOY_USER, DEPLOY_SSH_KEY (privada, ed25519) — ninguno vive acá ni
  # en ningún archivo versionado, el repo es público.
  deploy:
    needs: build-image
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Actualizar metadata_stack_app en Docker Swarm y migrar
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            docker pull ghcr.io/prettycore-13/metadata_stack:latest
            docker service update --image ghcr.io/prettycore-13/metadata_stack:latest --force metadata_stack_app

            echo "Esperando a que el servicio converja..."
            for i in $(seq 1 12); do
              REPLICAS=$(docker service ls --filter name=metadata_stack_app --format "{{.Replicas}}")
              echo "  replicas: $REPLICAS"
              if [ "$REPLICAS" = "1/1" ]; then break; fi
              sleep 5
            done

            CONTAINER_ID=$(docker ps -q --filter "name=metadata_stack_app" | head -n1)
            if [ -z "$CONTAINER_ID" ]; then
              echo "No se encontró el contenedor de metadata_stack_app corriendo, no se pudo migrar"
              exit 1
            fi
            docker exec "$CONTAINER_ID" /app/bin/migrate
